name: Build Debian Trixie Live ISO

on:
  push:
    branches: [ "main", "arm64-v0" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies & QEMU for arm64 Cross-Building
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            qemu-user-static \
            binfmt-support \
            debootstrap

      - name: Clean Previous Builds
        run: |
          mkdir -p live-build-dir
          cd live-build-dir
          sudo lb clean --purge
          sudo rm -rf .build/

      - name: Configure Live Build
        run: |
          cd live-build-dir
          
          export ARCH=arm64
          export DEBIAN_HAS_ARM64_EMULATION=true
          # This sets the target image name without breaking lb config
          export LB_IMAGE_NAME="LIKEALINUX_Kiryu"
          
          lb config \
            --distribution trixie \
            -a arm64 \
            --apt-recommends true \
            --compression zstd \
            --mirror-chroot-security https://security.debian.org/debian-security/ \
            --mirror-binary https://deb.debian.org/debian/ \
            --mirror-bootstrap https://deb.debian.org/debian/ \
            --parent-mirror-binary-updates https://deb.debian.org/debian/ \
            --linux-flavours "arm64" \
            --archive-areas "main contrib non-free non-free-firmware" \
            --iso-application "KazumaKiryu" \
            --iso-publisher "pbk123461" \
            --iso-volume "LIKEALINUX0" \
            --binary-images iso-hybrid \
            --system live \
            --bootappend-live "boot=live components quiet splash username=kiryulive hostname=LikeALinux" \
            --hdd-label "DojimaHQ" \
            --build-with-chroot true

      - name: Build ISO
        run: |
          cd live-build-dir
          sudo ARCH=arm64 lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIKEALINUX_Kiryu-ISO
          path: live-build-dir/*.iso