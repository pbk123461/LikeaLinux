name: Build Debian Trixie Live ISO

on:
  push:
    branches: [ "main", "arm64-v0" ]
  workflow_dispatch:

jobs:
  build-iso:
    # Switch from ubuntu-latest (which is x86_64) to the native ARM64 runner
    runs-on: ubuntu-latest-arm64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap

      - name: Run Build Script
        run: |
          chmod +x ./lbbuildandclean.sh
          
          # Run the script directly without needing foreign architecture overrides
          sudo ./lbbuildandclean.sh

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIKEALINUX_Kiryu-ISO
          path: |
            *.iso
            live-build-dir/*.iso