name: Build Debian Trixie Live ISO

on:
  push:
    branches: [ "main", "arm64-v0" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies & QEMU for arm64 Cross-Building
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            qemu-user-static \
            binfmt-support \
            debootstrap

      - name: Run Build Script
        run: |
          chmod +x ./lbbuildandclean.sh
          
          # Force architecture environments
          export ARCH=arm64
          export DEBIAN_HAS_ARM64_EMULATION=true
          export LB_IMAGE_NAME="LIKEALINUX_Kiryu"
          
          # Disable security and backports for Debian Testing (Trixie)
          export LB_SECURITY="false"
          export LB_BACKPORTS="false"
          
          # Execute your custom build and clean script
          sudo -E ./lbbuildandclean.sh

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIKEALINUX_Kiryu-ISO
          path: |
            *.iso
            live-build-dir/*.iso